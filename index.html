<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan Family Trip 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page-content { display: none; }
        .active-page { display: block; }
        .nav-link { cursor: pointer; }
        .hero-bg { background: #f8f9fa; border-radius: 15px; padding: 40px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-light">

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" onclick="showPage('home')">🇯🇵 Japan 2026</a>
            <div class="navbar-nav">
                <a class="nav-link" onclick="showPage('home')">Overview</a>
                <a class="nav-link" onclick="showPage('day1')">Day 1</a>
                <a class="nav-link" onclick="showPage('day2')">Day 2</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- OVERVIEW PAGE -->
        <div id="home" class="page-content active-page">
            <div class="hero-bg text-center">
                <h1>Our Family Adventure</h1>
                <p class="lead">Tokyo & Hammerhead sharks!</p>
                <hr>
                <div class="row text-start mt-4">
                    <div class="col-md-6">
                        <h5>Trip Goals:</h5>
                        <ul>
                            <li>Eat all the good food</li>
                            <li>Buy cute gatcha and shopping</li>
                            <li>See hammerhead sharks in Ido</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- DAY 1 PAGE -->
        <div id="day1" class="page-content">
            <h2>Day 1: Tokyo Arrival</h2>
            <div class="card p-3 mb-3">
                <p><strong>09:00 AM - 13:10 CI220</strong> TSA -> HND</p>
            </div>
            <iframe src="https://www.google.com/maps/d/u/0/embed?mid=12345XYZ" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        <!-- DAY 2 PAGE -->
        <div id="day2" class="page-content">
            <h2>Day 2: Shibuya shopping & eating</h2>
            <p> WoW </p>
        </div>
    </div>

    <!-- The "Magic" Script to switch pages -->
    <script>
        function showPage(pageId) {
            // Hide all pages
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(page => page.classList.remove('active-page'));
            
            // Show the clicked page
            document.getElementById(pageId).classList.add('active-page');
        }
    </script>

</body>
</html>
